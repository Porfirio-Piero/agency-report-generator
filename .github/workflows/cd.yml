name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Check for required files
        run: |
          test -f package.json || exit 1
          test -f next.config.ts || test -f next.config.js || test -f next.config.mjs || exit 1
          echo "✅ All required files present"
          
      - name: Validate package.json
        run: |
          node -e "const pkg = require('./package.json'); 
            if (!pkg.scripts.build) process.exit(1); 
            console.log('✅ Build script found');"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'preview')
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    timeout-minutes: 20
    environment:
      name: production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production deployment failed - ${new Date().toISOString()}`,
              body: `## Deployment Failure\n\n**Commit:** ${{ github.sha }}\n**Author:** ${{ github.actor }}\n**Workflow:** ${{ github.workflow }}\n\n[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['deployment', 'urgent']
            })